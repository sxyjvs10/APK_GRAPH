id: custom-company-token
info:
  name: Custom Company Token Detector
  author: APKGraph
  severity: high
  description: Detects proprietary internal company tokens in hardcoded strings.
patterns:
  - '(?i)MYCOMP-[A-Z0-9]{16}'

---
id: debug-endpoint-leak
info:
  name: Debug Endpoint Leak
  author: APKGraph
  severity: medium
  description: Detects internal staging or debug endpoints accidentally left in production builds.
patterns:
  - 'https://api-staging\.mycompany\.internal/.*'
  - 'http://10\.0\.[0-9]{1,3}\.[0-9]{1,3}:[0-9]{2,5}/.*'
