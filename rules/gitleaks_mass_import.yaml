- id: vault-service-token
  info:
    name: Vault Service Token
    author: Gitleaks Import
    severity: critical
    description: Identified a Vault Service Token, potentially compromising infrastructure
      security and access to sensitive credentials.
  patterns:
  - \b((?:hvs\.[\w-]{90,120}|s\.(?i:[a-z0-9]{24})))(?:[\x60'"\s;]|\\[nr]|$)
- id: yandex-access-token
  info:
    name: Yandex Access Token
    author: Gitleaks Import
    severity: critical
    description: Found a Yandex Access Token, posing a risk to Yandex service integrations
      and user data privacy.
  patterns:
  - (?i)[\w.-]{0,50}?(?:yandex)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}(t1\.[A-Z0-9a-z_-]+[=]{0,2}\.[A-Z0-9a-z_-]{86}[=]{0,2})(?:[\x60'"\s;]|\\[nr]|$)
- id: yandex-api-key
  info:
    name: Yandex Api Key
    author: Gitleaks Import
    severity: critical
    description: Discovered a Yandex API Key, which could lead to unauthorized access
      to Yandex services and data manipulation.
  patterns:
  - (?i)[\w.-]{0,50}?(?:yandex)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}(AQVN[A-Za-z0-9_\-]{35,38})(?:[\x60'"\s;]|\\[nr]|$)
- id: yandex-aws-access-token
  info:
    name: Yandex Aws Access Token
    author: Gitleaks Import
    severity: critical
    description: Uncovered a Yandex AWS Access Token, potentially compromising cloud
      resource access and data security on Yandex Cloud.
  patterns:
  - (?i)[\w.-]{0,50}?(?:yandex)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}(YC[a-zA-Z0-9_\-]{38})(?:[\x60'"\s;]|\\[nr]|$)
- id: zendesk-secret-key
  info:
    name: Zendesk Secret Key
    author: Gitleaks Import
    severity: critical
    description: Detected a Zendesk Secret Key, risking unauthorized access to customer
      support services and sensitive ticketing data.
  patterns:
  - (?i)[\w.-]{0,50}?(?:zendesk)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{40})(?:[\x60'"\s;]|\\[nr]|$)
